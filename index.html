<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Response Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e8ecf1 0%, #d5dce6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.12),
                0 8px 20px rgba(0, 0, 0, 0.06);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4a6cf7, #6a3de8);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 20px rgba(74, 108, 247, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: #4a6cf7;
        }

        .header-badge {
            background: rgba(74, 108, 247, 0.12);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #4a6cf7;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-badge .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 28px;
            margin-top: 2px;
        }

        /* Input Section */
        .input-section {
            background: #f8fafc;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .input-section:focus-within {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.08);
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e6ec;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
            background: white;
            color: #1a1a2e;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }

        textarea::placeholder {
            color: #9ca3af;
        }

        .quick-tests {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0 10px 0;
        }

        .quick-btn {
            padding: 6px 16px;
            background: white;
            border: 1px solid #e2e6ec;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4b5563;
        }

        .quick-btn:hover {
            background: #4a6cf7;
            color: white;
            border-color: #4a6cf7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.25);
        }

        .btn-analyze {
            padding: 14px 30px;
            background: linear-gradient(135deg, #4a6cf7, #6a3de8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(74, 108, 247, 0.3);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74, 108, 247, 0.4);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Results */
        .result-section {
            margin-top: 24px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Metrics */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: white;
            padding: 18px 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e9edf2;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            border-color: #4a6cf7;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .metric-number {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .metric-number.high { color: #22c55e; }
        .metric-number.medium { color: #f59e0b; }
        .metric-number.low { color: #ef4444; }

        .metric-label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
            margin-top: 4px;
        }

        .metric-model {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            word-break: break-all;
        }

        /* Diagnosis Cards */
        .diagnosis-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #e9edf2;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .diagnosis-card:hover {
            border-color: #d1d9e6;
        }

        .diagnosis-card .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .diagnosis-card .card-title .icon {
            font-size: 20px;
        }

        .diagnosis-card .card-content {
            font-size: 14px;
            line-height: 1.8;
            color: #374151;
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
        }

        .diagnosis-card.primary {
            border-left: 4px solid #4a6cf7;
        }

        .diagnosis-card.root-cause {
            border-left: 4px solid #f59e0b;
            background: #fffbeb;
        }

        .diagnosis-card.steps {
            border-left: 4px solid #22c55e;
            background: #f0fdf4;
        }

        .diagnosis-card.steps ul {
            margin: 8px 0 0 20px;
            line-height: 2;
        }

        .diagnosis-card.steps li {
            padding: 2px 0;
            color: #1a1a2e;
        }

        .diagnosis-card.steps li::marker {
            color: #22c55e;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #e9edf2;
            border-top-color: #4a6cf7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 16px 20px;
            border-radius: 12px;
            border-left: 4px solid #dc2626;
            margin-top: 16px;
        }

        /* Footer */
        .footer {
            margin-top: 28px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e9edf2;
        }

        .footer-text {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 400;
        }

        .footer-text strong {
            color: #6b7280;
            font-weight: 600;
        }

        .api-status {
            display: inline-block;
            margin-top: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .api-status.connected {
            color: #22c55e;
        }

        .api-status.disconnected {
            color: #ef4444;
        }

        .api-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .api-status.connected .dot {
            background: #22c55e;
        }

        .api-status.disconnected .dot {
            background: #ef4444;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 16px; }
            .container { padding: 24px; border-radius: 24px; }
            h1 { font-size: 22px; }
            .metrics { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .metrics { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .input-section { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-icon">🚨</div>
            <div>
                <h1>Incident <span>Response</span></h1>
            </div>
        </div>
        <div class="header-badge">
            <span class="dot"></span>
            <span id="apiStatusText">Connected</span>
        </div>
    </div>
    <p class="subtitle">AI agent with persistent memory that remembers past incidents</p>

    <!-- Input Section -->
    <div class="input-section">
        <label class="input-label">📝 Describe the incident</label>
        <textarea id="alertInput" placeholder="e.g., Payment service is returning 503 errors after deployment">Payment service is returning 503 errors</textarea>

        <div class="quick-tests">
            <button class="quick-btn" data-alert="Payment service is returning 503 errors">💳 Payment 503</button>
            <button class="quick-btn" data-alert="Database connections are timing out">🗄️ DB Timeout</button>
            <button class="quick-btn" data-alert="Search pods are in CrashLoopBackOff">🔍 CrashLoop</button>
            <button class="quick-btn" data-alert="Dashboard loading slowly, reports timing out">📊 Slow Dashboard</button>
            <button class="quick-btn" data-alert="Storage full, uploads failing">💾 Storage Full</button>
        </div>

        <button class="btn-analyze" id="analyzeBtn">🚀 Analyze Incident</button>
    </div>

    <!-- Results -->
    <div class="result-section" id="resultSection">
        <div id="loadingIndicator" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p style="margin-top:12px; font-weight:500;">Analyzing incident with AI memory...</p>
        </div>
        <div id="errorDisplay" class="error" style="display:none;"></div>

        <div id="resultContent" style="display:none;">
            <!-- Metrics -->
            <div class="metrics" id="metricsContainer"></div>

            <!-- Diagnosis -->
            <div id="diagnosisCard" class="diagnosis-card primary"></div>

            <!-- Root Cause -->
            <div id="rootCauseCard" class="diagnosis-card root-cause" style="display:none;"></div>

            <!-- Steps -->
            <div id="stepsCard" class="diagnosis-card steps" style="display:none;"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-text">
            Powered by <strong>Hindsight Cloud</strong> · <strong>cascadeflow</strong> · <strong>Groq</strong>
        </div>
        <div class="api-status" id="apiStatus">
            <span class="dot"></span> Connecting...
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://localhost:8000';

    // DOM Elements
    const alertInput = document.getElementById('alertInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultSection = document.getElementById('resultSection');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const errorDisplay = document.getElementById('errorDisplay');
    const resultContent = document.getElementById('resultContent');
    const metricsContainer = document.getElementById('metricsContainer');
    const apiStatus = document.getElementById('apiStatus');
    const diagnosisCard = document.getElementById('diagnosisCard');
    const rootCauseCard = document.getElementById('rootCauseCard');
    const stepsCard = document.getElementById('stepsCard');

    // Health Check
    async function checkHealth() {
        try {
            const response = await fetch(`${API_URL}/health`);
            if (response.ok) {
                apiStatus.className = 'api-status connected';
                apiStatus.innerHTML = '<span class="dot"></span> Connected to API';
                document.querySelector('.header-badge .dot').style.background = '#22c55e';
            } else {
                apiStatus.className = 'api-status disconnected';
                apiStatus.innerHTML = '<span class="dot"></span> API server running';
            }
        } catch (e) {
            apiStatus.className = 'api-status disconnected';
            apiStatus.innerHTML = '<span class="dot"></span> Start with: python run.py';
            document.querySelector('.header-badge .dot').style.background = '#ef4444';
        }
    }

    // Quick Test Buttons
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            alertInput.value = this.dataset.alert;
        });
    });

    // Analyze Button
    analyzeBtn.addEventListener('click', analyzeIncident);

    // Ctrl+Enter Shortcut
    alertInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.ctrlKey) {
            analyzeIncident();
        }
    });

    async function analyzeIncident() {
        const alert = alertInput.value.trim();
        if (!alert) {
            showError('Please describe the incident');
            return;
        }

        loadingIndicator.style.display = 'block';
        resultContent.style.display = 'none';
        errorDisplay.style.display = 'none';
        resultSection.classList.add('show');
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = '⏳ Analyzing...';

        try {
            const response = await fetch(`${API_URL}/incident`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ alert }),
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || `Error ${response.status}`);
            }

            const data = await response.json();
            displayResults(data);

        } catch (e) {
            showError(e.message);
        } finally {
            loadingIndicator.style.display = 'none';
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = '🚀 Analyze Incident';
        }
    }

    function displayResults(data) {
        resultContent.style.display = 'block';

        let confidenceClass = 'high';
        if (data.confidence === 'Medium') confidenceClass = 'medium';
        if (data.confidence === 'Low') confidenceClass = 'low';

        metricsContainer.innerHTML = `
            <div class="metric-card">
                <div class="metric-number ${confidenceClass}">${data.confidence || 'Medium'}</div>
                <div class="metric-label">Confidence</div>
            </div>
            <div class="metric-card">
                <div class="metric-model">${data.model_used || 'Unknown'}</div>
                <div class="metric-label">Model Used</div>
            </div>
            <div class="metric-card">
                <div class="metric-number" style="color:#4a6cf7;">$${(data.cost || 0).toFixed(6)}</div>
                <div class="metric-label">Cost</div>
            </div>
        `;

        // Diagnosis
        const diagnosisText = data.diagnosis || 'No diagnosis available.';
        diagnosisCard.innerHTML = `
            <div class="card-title"><span class="icon">🔍</span> Diagnosis</div>
            <div class="card-content">${diagnosisText.replace(/\n/g, '<br>')}</div>
        `;

        // Root Cause
        const rootCause = data.root_cause || '';
        if (rootCause && rootCause !== 'See diagnosis' && rootCause !== 'Unknown') {
            rootCauseCard.style.display = 'block';
            rootCauseCard.innerHTML = `
                <div class="card-title"><span class="icon">🎯</span> Root Cause</div>
                <div class="card-content">${rootCause}</div>
            `;
        } else {
            rootCauseCard.style.display = 'none';
        }

        // Resolution Steps
        const steps = data.resolution_steps || [];
        const validSteps = steps.filter(s => s && s !== 'See diagnosis' && s.length > 5);
        if (validSteps.length > 0) {
            stepsCard.style.display = 'block';
            let stepsHTML = '<div class="card-title"><span class="icon">✅</span> Recovery Steps</div><ul>';
            validSteps.forEach(step => {
                stepsHTML += `<li>${step}</li>`;
            });
            stepsHTML += '</ul>';
            stepsCard.innerHTML = stepsHTML;
        } else {
            stepsCard.style.display = 'none';
        }

        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(message) {
        errorDisplay.textContent = '❌ ' + message;
        errorDisplay.style.display = 'block';
        resultContent.style.display = 'none';
    }

    // Initialize
    checkHealth();
    setInterval(checkHealth, 30000);
</script>

</body>
</html>
